name: Atualizar Market Data

on:
  schedule:
    - cron: '0 22 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Executar script
        run: |
          python main.py

      - name: Configurar Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Trocar para branch market-data
        run: |
          git fetch origin

          if git show-ref --verify --quiet refs/remotes/origin/market-data
          then
            git checkout market-data
          else
            git checkout --orphan market-data
          fi

      - name: Commitar market data
        run: |
          git add -f ativos.json ativos.csv

          git commit -m "Atualização automática market data" || echo "Sem alterações"

          git push origin market-data